# Air configuration for Alib CRM backend
# Docs: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  bin = "./tmp/main.exe"
  full_bin = "./tmp/main.exe"
  include_ext = ["go"]
  exclude_dir = ["tmp", "migrations"]
  delay = 1000
  kill_delay = "0s"
  rerun = false
  rerun_delay = 500

[log]
  main_only = false
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
